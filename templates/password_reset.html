{% extends "base-auth.html" %}

{% block title %}Reset Password | KIU Financial Portal{% endblock %}

{% block content %}
<main class="min-h-screen flex items-center justify-center p-6">
    <div class="w-full max-w-md bg-white border border-outline-variant rounded-xl shadow-sm p-8">
        <h1 class="font-headline-md text-headline-md text-primary mb-2">Reset password</h1>
        <p class="text-sm text-on-surface-variant mb-6">Set a new password for your account.</p>

        <form method="POST" action="{{ url_for('reset_password') }}" class="space-y-4">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <div>
                <label for="new-password" class="block text-sm font-semibold text-on-surface-variant mb-1">New password</label>
                <input id="new-password" name="new-password" type="password" required class="w-full px-3 py-2 border border-outline-variant rounded-lg">
            </div>
            <div>
                <label for="confirm-password" class="block text-sm font-semibold text-on-surface-variant mb-1">Confirm password</label>
                <input id="confirm-password" name="confirm-password" type="password" required class="w-full px-3 py-2 border border-outline-variant rounded-lg">
            </div>
            <button type="submit" class="w-full py-2.5 rounded-lg bg-secondary text-white font-semibold">Reset Password</button>
        </form>

        <div class="mt-5 text-sm">
            <a href="{{ url_for('login') }}" class="text-secondary hover:underline">Back to login</a>
        </div>
    </div>
</main>
{% endblock %}
