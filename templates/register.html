{% extends "base-auth.html" %}

{% block title %}Register | KIU Financial Portal{% endblock %}

{% block content %}
<main class="min-h-screen flex items-center justify-center p-6">
    <div class="w-full max-w-md bg-white border border-outline-variant rounded-xl shadow-sm p-8">
        <h1 class="font-headline-md text-headline-md text-primary mb-2">Create account</h1>
        <p class="text-sm text-on-surface-variant mb-6">Register to access your student finance dashboard.</p>

        <form method="POST" action="{{ url_for('register') }}" class="space-y-4">
            <div>
                <label for="username" class="block text-sm font-semibold text-on-surface-variant mb-1">Username</label>
                <input id="username" name="username" type="text" required class="w-full px-3 py-2 border border-outline-variant rounded-lg">
            </div>
            <div>
                <label for="email" class="block text-sm font-semibold text-on-surface-variant mb-1">Email</label>
                <input id="email" name="email" type="email" required class="w-full px-3 py-2 border border-outline-variant rounded-lg">
            </div>
            <div>
                <label for="password" class="block text-sm font-semibold text-on-surface-variant mb-1">Password</label>
                <input id="password" name="password" type="password" required class="w-full px-3 py-2 border border-outline-variant rounded-lg">
            </div>
            <div>
                <label for="confirm_password" class="block text-sm font-semibold text-on-surface-variant mb-1">Confirm password</label>
                <input id="confirm_password" name="confirm_password" type="password" required class="w-full px-3 py-2 border border-outline-variant rounded-lg">
            </div>
            <button type="submit" class="w-full py-2.5 rounded-lg bg-secondary text-white font-semibold">Register</button>
        </form>

        <div class="mt-5 text-sm">
            <a href="{{ url_for('login') }}" class="text-secondary hover:underline">Already have an account? Login</a>
        </div>
    </div>
</main>
{% endblock %}
