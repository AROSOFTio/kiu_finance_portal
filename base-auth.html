<!DOCTYPE html>
<html class="light" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>{% block title %}KIU Financial Portal{% endblock %}</title>
    
    <!-- Styles -->
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@400;600;700;800&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    
    <style>
        body {
            font-family: 'Public Sans', 'Inter', sans-serif;
        }
    </style>
    
    <script id="tailwind-config">
        tailwind.config = {
          darkMode: "class",
          theme: {
            extend: {
              "colors": {
                      "on-tertiary-fixed-variant": "#604100",
                      "outline": "#74777e",
                      "inverse-primary": "#b3c7ec",
                      "secondary-fixed": "#8df8b7",
                      "surface-container-highest": "#e0e3e5",
                      "on-surface-variant": "#44474d",
                      "background": "#f7f9fb",
                      "secondary": "#006d40",
                      "on-secondary-fixed": "#002110",
                      "surface-bright": "#f7f9fb",
                      "on-primary-fixed": "#031c38",
                      "on-primary": "#ffffff",
                      "surface-container-high": "#e6e8ea",
                      "secondary-fixed-dim": "#70db9d",
                      "on-surface": "#191c1e",
                      "primary-fixed": "#d5e3ff",
                      "surface-tint": "#4b5f7f",
                      "primary": "#000d21",
                      "error": "#ba1a1a",
                      "primary-fixed-dim": "#b3c7ec",
                      "on-tertiary-container": "#b87f00",
                      "tertiary-container": "#311f00",
                      "inverse-on-surface": "#eff1f3",
                      "on-error": "#ffffff",
                      "tertiary-fixed": "#ffdeae",
                      "on-secondary-container": "#007243",
                      "inverse-surface": "#2d3133",
                      "on-primary-container": "#778bad",
                      "surface-container-low": "#f2f4f6",
                      "on-tertiary-fixed": "#281900",
                      "surface": "#f7f9fb",
                      "primary-container": "#0c2340",
                      "surface-container-lowest": "#ffffff",
                      "on-tertiary": "#ffffff",
                      "outline-variant": "#c4c6ce",
                      "error-container": "#ffdad6",
                      "secondary-fixed-dim": "#b3e7c3",
                      "tertiary-fixed-dim": "#ffba3e",
                      "on-error-container": "#93000a",
                      "on-secondary-fixed-variant": "#00522f"
              }
            },
          },
        }
    </script>
    
    {% block extra_css %}{% endblock %}
</head>

<body class="bg-background text-on-surface">
    <!-- Flash Messages -->
    {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
            {% for category, message in messages %}
                <div class="fixed top-4 right-4 z-50 bg-{{ 'emerald' if category == 'success' else 'red' if category == 'danger' else 'blue' }}-500 text-white px-6 py-3 rounded-lg shadow-lg" id="flash-{{ loop.index }}">
                    {{ message }}
                </div>
                <script>
                    setTimeout(() => document.getElementById('flash-{{ loop.index }}').remove(), 5000);
                </script>
            {% endfor %}
        {% endif %}
    {% endwith %}

    <!-- Content -->
    {% block content %}{% endblock %}

    {% block extra_js %}{% endblock %}
</body>
</html>
