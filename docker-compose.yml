version: "3.9"

services:
  # ─── Flask Application ─────────────────────────────────────
  app:
    build: .
    container_name: kiu_flask_app
    restart: unless-stopped
    ports:
      - "4005:5000"
    env_file:
      - .env
    environment:
      MYSQL_HOST: db
      MYSQL_PORT: 3306
    volumes:
      - .:/app
      - qrcode_data:/app/static/qrcodes
      - upload_data:/app/instance/payment_proofs
    depends_on:
      db:
        condition: service_healthy
    networks:
      - kiu_network

  # ─── MySQL Database ────────────────────────────────────────
  db:
    image: mysql:8.0
    container_name: kiu_mysql_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root_secure_pass}
      MYSQL_DATABASE: ${MYSQL_DB:-kiu_finance}
      MYSQL_USER: ${MYSQL_USER:-kiu_user}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-kiu_secure_pass}
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-root_secure_pass}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - kiu_network

  # ─── phpMyAdmin (Optional) ────────────────────────────────
  phpmyadmin:
    image: phpmyadmin:latest
    container_name: kiu_phpmyadmin
    restart: unless-stopped
    ports:
      - "8088:80"
    environment:
      PMA_HOST: db
      PMA_USER: ${MYSQL_USER:-kiu_user}
      PMA_PASSWORD: ${MYSQL_PASSWORD:-kiu_secure_pass}
      UPLOAD_LIMIT: 64M
    depends_on:
      db:
        condition: service_healthy
    networks:
      - kiu_network

# ─── Volumes ───────────────────────────────────────────────
volumes:
  mysql_data:
    name: kiu_mysql_data
  qrcode_data:
    name: kiu_qrcode_data
  upload_data:
    name: kiu_upload_data

# ─── Networks ──────────────────────────────────────────────
networks:
  kiu_network:
    name: kiu_network
    driver: bridge
